#Configure the below given properties in CartMS.yml of consul server

spring.application.name=Cart-service

server.port=3335
#spring.datasource.url=jdbc:mysql://localhost:3306/EKART_CUSTOMERCART?useSSL=false
spring.datasource.url=jdbc:mysql://localhost:3306/EKART_CUSTOMERCART

#Configure the below common properties in application.yml of consul server
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.show-sql=true

#server.error.whitelabel.enabled=false
logging.level.org.hibernate.type=info
spring.jpa.properties.hibernate.show_sql: true
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=info,health
management.endpoint.info.enabled=true

server.servlet.context-path=/Ekart

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

#spring.cloud.consul.discovery.health-check-url = http://localhost:${server.port}${server.servlet.context-path}/actuator

#spring.config.import=optional:configserver:http://localhost:3335
